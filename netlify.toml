# Premier League Bookings Desk. Single static index.html, no build step.
# Live FPL data is proxied through the fpl Netlify Function at /api/fpl/*.
[build]
  publish = "."
  command = ""

[build.environment]
  # The Supabase project URL is public client configuration — it ships in
  # index.html by design (Supabase's model: RLS + anon key in the client),
  # so the secrets scanner must not fail the build on it. Real secrets
  # (service-role key, Anthropic key) are still scanned.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/data/pl_data.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

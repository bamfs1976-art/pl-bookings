# Premier League Bookings Desk. Single static index.html, no build step.
# Live FPL data is proxied through the fpl Netlify Function at /api/fpl/*.
[build]
  publish = "."
  command = ""

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/data/pl_data.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

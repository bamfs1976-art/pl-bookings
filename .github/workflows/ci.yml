name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Syntax-check scripts (Netlify functions, service worker, core, inline)
        run: |
          node --check netlify/functions/fpl.js
          node --check netlify/functions/insights.js
          node --check sw.js
          node --check assets/core.js
          node --check data/pl_data.js
          node --check data/model.js
          node scripts/check-inline.mjs

      - name: Model builder is reproducible (season prior regenerates cleanly)
        run: node scripts/build-model.mjs

      - name: Data guard (pl_data.js counts, no inline dataset in index.html)
        run: node scripts/check-data.mjs

      - name: Unit tests (PLDCore)
        run: node tests/test-core.mjs

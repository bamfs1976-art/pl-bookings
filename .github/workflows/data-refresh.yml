name: Data refresh

# Refreshes the app's baked data and regenerates data/pl_data.js.
# Run it from the Actions tab (Run workflow).
#
# Referees are always refreshed — free source, no secret needed
# (football-data.co.uk mirror at github.com/datasets/football-datasets).
#
# Player/club stats need the SS_COOKIE repository secret: the cookie header
# from a logged-in scoutingstats.ai browser session (Settings -> Secrets and
# variables -> Actions -> New secret). Without it, that part is skipped and
# only the referee data updates.
on:
  workflow_dispatch:
    inputs:
      refs_season:
        description: "football-data season code for referees (e.g. 2526)"
        required: false
        default: "2526"
      season_pl:
        description: "ScoutingStats season id for the Premier League (blank = current)"
        required: false
        default: ""
      season_ch:
        description: "ScoutingStats season id for the Championship (blank = current)"
        required: false
        default: ""
      fit_model:
        description: "Fit the card model on FPL per-match history (Tier 2). Keeps the season prior until enough matches exist."
        type: boolean
        required: false
        default: true

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh referees (free source, always runs)
        run: python3 data/build_refs.py --season "${{ inputs.refs_season }}"

      - name: Harvest players from ScoutingStats
        if: ${{ secrets.SS_COOKIE != '' }}
        env:
          SS_COOKIE: ${{ secrets.SS_COOKIE }}
          SS_SEASON_PL: ${{ inputs.season_pl }}
          SS_SEASON_CH: ${{ inputs.season_ch }}
        run: python3 data/harvest.py

      - name: Rebuild pl_data.js from the harvest
        if: ${{ secrets.SS_COOKIE != '' }}
        run: python3 data/build_pl_data.py

      # After build_pl_data regenerates CLUBS, re-add the home/away
      # cards-against splits (same free source as the referees step).
      - name: Refresh club home/away splits
        run: python3 data/build_club_splits.py --season "${{ inputs.refs_season }}"

      # Keep the season-prior model in sync with any refreshed player data.
      - name: Refresh the season-prior model
        run: node scripts/build-model.mjs

      # Tier 2: harvest per-match booking history from the public FPL
      # element-summary endpoint and refit the logistic GLM by IRLS. Runs on
      # GitHub's runners, which can reach the FPL API. build-model.mjs keeps the
      # season prior automatically until >=200 real match rows exist, so this is
      # a no-op early in the season and quietly flips the model to "match-fit"
      # once games accumulate. Never fails the refresh.
      - name: Fit the card model on match history (Tier 2)
        if: ${{ inputs.fit_model }}
        continue-on-error: true
        run: |
          python3 data/harvest_history.py
          node scripts/build-model.mjs --fit data/match_history.json
          node scripts/backtest.mjs || true

      - name: Guard the dataset
        run: |
          node scripts/check-data.mjs
          node tests/test-core.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pl_data.js data/model.js
          if git diff --cached --quiet; then
            echo "No data or model changes."
          else
            basis=$(node -e "console.log(require('./data/model.js').basis)")
            git commit -m "Refresh data + model (model basis: ${basis})"
            git push
          fi
